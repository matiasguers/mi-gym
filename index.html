<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mi Gym">
<title>Mi Progreso Gym</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --purple: #534AB7; --purple-light: #EEEDFE; --purple-mid: #AFA9EC;
    --teal: #0F6E56; --teal-light: #E1F5EE;
    --amber: #854F0B; --amber-light: #FAEEDA; --amber-mid: #EF9F27;
    --red-light: #FCEBEB; --red: #A32D2D;
    --bg: #f5f4f0; --surface: #fff; --card: #f8f7f4;
    --border: #ece9e2; --border2: #e2e2e2;
    --text: #1a1a18; --muted: #888; --faint: #bbb;
    --font: 'DM Sans', system-ui, sans-serif;
    --radius: 12px; --radius-sm: 8px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  html, body { height: 100%; background: var(--bg); font-family: var(--font); color: var(--text); -webkit-tap-highlight-color: transparent; }
  button { font-family: var(--font); cursor: pointer; }
  input, select { font-family: var(--font); }
  input:focus, select:focus { outline: none; }

  /* LAYOUT */
  #app { display: flex; flex-direction: column; height: 100dvh; }
  #header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 16px 0; position: sticky; top: 0; z-index: 100; }
  #header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  #header h1 { font-size: 20px; font-weight: 800; letter-spacing: -.5px; }
  #header .sub { font-size: 12px; color: var(--muted); font-weight: 600; margin-top: 2px; }
  .count-pill { background: var(--purple-light); border-radius: 10px; padding: 5px 12px; font-size: 12px; font-weight: 700; color: var(--purple); }
  .tabs { display: flex; }
  .tab-btn { flex: 1; padding: 8px 0; background: none; border: none; border-bottom: 3px solid transparent; color: var(--muted); font-weight: 700; font-size: 14px; transition: all .15s; }
  .tab-btn.active { border-bottom-color: var(--purple); color: var(--purple); }
  #content { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: calc(16px + var(--safe-bottom)); -webkit-overflow-scrolling: touch; }

  /* CARDS */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
  .card-inner { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; }

  /* LABELS */
  .label { font-size: 11px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .05em; display: block; margin-bottom: 5px; }

  /* INPUTS */
  input[type=text], input[type=date], input[type=number], select {
    width: 100%; padding: 9px 12px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--border2); font-size: 14px;
    background: #fafaf8; color: var(--text);
  }
  input[type=number] { text-align: center; font-weight: 700; }

  /* GRID */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .grid3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }

  /* DAY BUTTONS */
  .day-btn { padding: 8px 0; border-radius: var(--radius-sm); border: 1.5px solid var(--border2); background: #fafaf8; color: var(--muted); font-weight: 700; font-size: 13px; }
  .day-btn.active { border-color: var(--purple); background: var(--purple-light); color: var(--purple); }

  /* SET ROW */
  .set-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
  .set-num { font-size: 12px; color: var(--muted); font-weight: 700; min-width: 18px; }
  .set-row input { width: 68px; flex: 0 0 68px; }
  .set-unit { font-size: 12px; color: var(--faint); }
  .set-vol { font-size: 11px; color: var(--muted); margin-left: 4px; white-space: nowrap; }
  .remove-btn { margin-left: auto; background: none; border: none; color: var(--faint); font-size: 18px; padding: 0 4px; line-height: 1; }

  /* BUTTONS */
  .btn-primary { width: 100%; padding: 13px; border-radius: var(--radius); background: var(--purple); color: #fff; border: none; font-weight: 800; font-size: 15px; letter-spacing: .01em; transition: opacity .15s; }
  .btn-primary:disabled { background: var(--faint); }
  .btn-primary:active { opacity: .85; }
  .btn-dashed { width: 100%; padding: 10px; border-radius: var(--radius); border: 2px dashed var(--border2); background: transparent; color: var(--muted); font-weight: 700; font-size: 14px; }
  .btn-add-set { background: none; border: 1.5px dashed var(--border2); border-radius: var(--radius-sm); padding: 5px 14px; font-size: 12px; color: var(--muted); font-weight: 700; margin-top: 4px; }
  .btn-ghost { background: none; border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 5px 12px; font-size: 12px; color: var(--muted); font-weight: 600; }
  .btn-danger { background: none; border: 1px solid #f0999b; color: var(--red); border-radius: var(--radius-sm); padding: 5px 12px; font-size: 12px; font-weight: 600; }

  /* FILTER PILLS */
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
  .filter-btn { padding: 5px 12px; border-radius: 99px; border: 1.5px solid var(--border2); background: transparent; color: var(--muted); font-size: 12px; font-weight: 700; }
  .filter-btn.active { border-color: var(--purple); background: var(--purple-light); color: var(--purple); }
  .search-input { margin-left: auto; padding: 5px 12px; border-radius: 99px; border: 1.5px solid var(--border2); font-size: 12px; background: #fafaf8; color: var(--text); width: 150px; }

  /* HISTORY */
  .workout-card { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; }
  .workout-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #fafaf8; cursor: pointer; }
  .workout-body { padding: 12px 16px; border-top: 1px solid var(--border); background: var(--surface); }
  .set-chip { display: inline-block; padding: 4px 10px; border-radius: 8px; background: var(--card); border: 1px solid var(--border2); font-size: 12px; font-weight: 600; color: #555; margin: 2px; }
  .set-chip.pr { background: var(--amber-light); border-color: var(--amber-mid); color: var(--amber); }

  /* STATS */
  .stat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 16px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 8px; text-align: center; }
  .stat-val { font-size: 22px; font-weight: 800; color: var(--purple); letter-spacing: -.5px; }
  .stat-label { font-size: 10px; color: var(--faint); font-weight: 700; text-transform: uppercase; letter-spacing: .04em; margin-top: 3px; }

  /* CHART */
  .chart-wrap { display: flex; align-items: flex-end; gap: 3px; height: 90px; padding-top: 20px; position: relative; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .bar { width: 100%; border-radius: 4px 4px 0 0; transition: height .3s ease; min-height: 3px; background: var(--purple); opacity: .6; }
  .bar.best { background: var(--amber-mid); opacity: 1; }
  .bar-val { font-size: 8px; color: var(--muted); font-weight: 700; }
  .bar-lbl { font-size: 8px; color: var(--faint); }

  /* PR LIST */
  .pr-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-radius: 10px; background: #fafaf8; border: 1px solid var(--border); margin-bottom: 6px; }

  /* VOLUME BOX */
  .vol-box { display: flex; align-items: center; justify-content: space-between; background: #f0efe9; border-radius: 10px; padding: 10px 16px; margin-bottom: 12px; }

  /* EMPTY */
  .empty { text-align: center; padding: 48px 0; color: var(--faint); font-size: 14px; }

  /* ADD EXERCISE PANEL */
  .add-panel { background: var(--purple-light); border: 1px solid var(--purple-mid); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
  .add-panel select, .add-panel input { border-color: var(--purple-mid); color: var(--purple); background: #fff; margin-bottom: 8px; }
  .add-panel-btns { display: flex; gap: 8px; }
  .btn-add-confirm { flex: 1; padding: 9px; border-radius: var(--radius-sm); background: var(--purple); color: #fff; border: none; font-weight: 700; font-size: 13px; }
  .btn-add-cancel { padding: 9px 16px; border-radius: var(--radius-sm); background: none; border: 1px solid var(--purple-mid); color: var(--purple); font-size: 13px; }

  /* TOAST */
  #toast { position: fixed; bottom: calc(24px + var(--safe-bottom)); left: 50%; transform: translateX(-50%) translateY(20px); background: #1a1a18; color: #fff; padding: 10px 20px; border-radius: 99px; font-size: 13px; font-weight: 700; opacity: 0; transition: all .3s; pointer-events: none; z-index: 999; white-space: nowrap; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (min-width: 600px) {
    #content { max-width: 560px; margin: 0 auto; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-top">
      <div>
        <h1>Mi Progreso</h1>
        <div class="sub">Plan 12 semanas · DUP · Mar/Mié/Jue</div>
      </div>
      <div class="count-pill" id="count-pill">0 entrenos</div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('log')">Registrar</button>
      <button class="tab-btn" onclick="showTab('history')">Historial</button>
      <button class="tab-btn" onclick="showTab('stats')">Progreso</button>
    </div>
  </div>
  <div id="content"></div>
</div>
<div id="toast"></div>

<script>
const EXERCISES = [
  "Sentadilla con barra","Peso muerto rumano","Peso muerto convencional",
  "Press de banca","Press militar (OHP)","Remo con barra","Jalón al pecho",
  "Sentadilla búlgara","Press de banca inclinado","Remo en polea baja",
  "Face pull con cuerda","Curl de bíceps","Curl martillo","Extensión de tríceps",
  "Press francés","Hip thrust con barra","Zancada caminando",
  "Elevación lateral","Remo con mancuerna","Press con mancuernas"
];
const WEEK_PHASE = {1:"Fase 1",2:"Fase 1",3:"Fase 1",4:"Fase 1",5:"Deload",
  6:"Fase 2",7:"Fase 2",8:"Test 5RM",9:"Deload",10:"Fase 3",11:"Fase 3",12:"Test 1RM"};

let workouts = JSON.parse(localStorage.getItem("gym_workouts")||"[]");
let currentTab = "log";
let logState = {
  date: new Date().toISOString().slice(0,10),
  week: 1, day: "Día A", note: "",
  exercises: [], adding: false, newEx: EXERCISES[0], customEx: ""
};
let histState = { filter:"all", search:"", expanded:null };
let statsState = { selectedEx: "" };

function save() {
  localStorage.setItem("gym_workouts", JSON.stringify(workouts));
  document.getElementById("count-pill").textContent =
    workouts.length + (workouts.length===1?" entreno":" entrenos");
}

function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2200);
}

function calcVol(sets) {
  return sets.reduce((a,s)=>a+(parseFloat(s.w)||0)*(parseInt(s.r)||0),0);
}

function fmtDate(d) {
  return new Date(d+"T12:00:00").toLocaleDateString("es-AR",{day:"2-digit",month:"short",year:"numeric"});
}

// ─── LOG TAB ────────────────────────────────────────────────────────────────
function renderLog() {
  const s = logState;
  const totalVol = s.exercises.reduce((a,ex)=>a+calcVol(ex.sets),0);

  let exHtml = s.exercises.map((ex,ei) => {
    const setsHtml = ex.sets.map((set,si) => {
      const vol = (parseFloat(set.w)||0)*(parseInt(set.r)||0);
      return `
      <div class="set-row">
        <span class="set-num">${si+1}</span>
        <input type="number" min="0" step="0.5" placeholder="kg" value="${set.w}"
          oninput="updateSet(${ei},${si},'w',this.value)" style="width:70px;flex:0 0 70px">
        <span class="set-unit">kg ×</span>
        <input type="number" min="1" step="1" placeholder="reps" value="${set.r}"
          oninput="updateSet(${ei},${si},'r',this.value)" style="width:62px;flex:0 0 62px">
        <span class="set-unit">rep</span>
        ${vol>0?`<span class="set-vol">${vol.toFixed(0)}kg</span>`:""}
        <button class="remove-btn" onclick="removeSet(${ei},${si})">×</button>
      </div>`;
    }).join("");
    return `
    <div class="card-inner">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <span style="font-weight:700;font-size:14px">${ex.name}</span>
        <button class="btn-ghost" onclick="removeExercise(${ei})">Eliminar</button>
      </div>
      ${setsHtml}
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px">
        <button class="btn-add-set" onclick="addSet(${ei})">+ Serie</button>
        <span style="font-size:11px;color:var(--muted)">Vol: ${calcVol(ex.sets).toFixed(0)} kg</span>
      </div>
    </div>`;
  }).join("");

  let addPanelHtml = s.adding ? `
  <div class="add-panel">
    <select id="new-ex-sel" onchange="logState.newEx=this.value">
      ${EXERCISES.map(e=>`<option value="${e}" ${e===s.newEx?"selected":""}>${e}</option>`).join("")}
    </select>
    <input type="text" placeholder="O escribí un ejercicio personalizado..." id="custom-ex-inp"
      value="${s.customEx}" oninput="logState.customEx=this.value" style="margin-bottom:8px">
    <div class="add-panel-btns">
      <button class="btn-add-confirm" onclick="confirmAddEx()">Agregar</button>
      <button class="btn-add-cancel" onclick="logState.adding=false;render()">Cancelar</button>
    </div>
  </div>` : `<button class="btn-dashed" onclick="logState.adding=true;render()" style="margin-bottom:12px">+ Agregar ejercicio</button>`;

  return `
  <div>
    <div class="card" style="margin-bottom:12px">
      <div class="grid2">
        <div>
          <label class="label">Fecha</label>
          <input type="date" value="${s.date}" onchange="logState.date=this.value">
        </div>
        <div>
          <label class="label">Semana</label>
          <select onchange="logState.week=+this.value">
            ${Array.from({length:12},(_,i)=>i+1).map(w=>
              `<option value="${w}" ${w===s.week?"selected":""}>Sem ${w} — ${WEEK_PHASE[w]}</option>`
            ).join("")}
          </select>
        </div>
      </div>
      <div style="margin-bottom:12px">
        <label class="label">Día</label>
        <div class="grid3">
          ${["Día A","Día B","Día C"].map(d=>
            `<button class="day-btn${d===s.day?" active":""}" onclick="logState.day='${d}';render()">${d}</button>`
          ).join("")}
        </div>
      </div>
      <div>
        <label class="label">Nota (opcional)</label>
        <input type="text" placeholder="Ej: dormí poco, pesado hoy..." value="${s.note}"
          oninput="logState.note=this.value">
      </div>
    </div>

    ${exHtml}
    ${addPanelHtml}

    ${s.exercises.length>0?`
    <div class="vol-box">
      <span style="font-size:13px;color:var(--muted)">Volumen total</span>
      <span style="font-size:18px;font-weight:800;color:var(--purple)">${totalVol.toFixed(0)} kg</span>
    </div>`:""}

    <button class="btn-primary" onclick="saveWorkout()" ${!s.exercises.length?"disabled":""}>
      Guardar entreno
    </button>
  </div>`;
}

function updateSet(ei,si,field,val) {
  logState.exercises[ei].sets[si][field] = val;
  const totalVol = logState.exercises.reduce((a,ex)=>a+calcVol(ex.sets),0);
  const volEl = document.querySelector(".vol-box span:last-child");
  if(volEl) volEl.textContent = totalVol.toFixed(0)+" kg";
  const setRows = document.querySelectorAll(".card-inner");
  if(setRows[ei]) {
    const vols = setRows[ei].querySelectorAll(".set-vol");
  }
}

function addSet(ei) { logState.exercises[ei].sets.push({w:"",r:""}); render(); }
function removeSet(ei,si) {
  logState.exercises[ei].sets.splice(si,1);
  if(!logState.exercises[ei].sets.length) logState.exercises[ei].sets.push({w:"",r:""});
  render();
}
function removeExercise(ei) { logState.exercises.splice(ei,1); render(); }
function confirmAddEx() {
  const custom = document.getElementById("custom-ex-inp")?.value.trim();
  const sel = document.getElementById("new-ex-sel")?.value;
  const name = custom || sel || logState.newEx;
  logState.exercises.push({ name, sets:[{w:"",r:""}] });
  logState.customEx=""; logState.adding=false; render();
}
function saveWorkout() {
  const s = logState;
  const exs = s.exercises.map(ex=>({
    name:ex.name,
    sets:ex.sets.filter(s=>s.w||s.r).map(s=>({weight:parseFloat(s.w)||0,reps:parseInt(s.r)||0}))
  })).filter(ex=>ex.sets.length>0);
  if(!exs.length){toast("Agregá al menos un ejercicio con datos.");return;}
  const w = {
    id:Date.now(), date:s.date, week:s.week, day:s.day,
    phase:WEEK_PHASE[s.week]||"–", note:s.note, exercises:exs
  };
  workouts.push(w);
  save();
  logState.exercises=[]; logState.note="";
  render();
  toast("Entreno guardado!");
}

// ─── HISTORY TAB ─────────────────────────────────────────────────────────────
function getPRs() {
  const prs={};
  [...workouts].sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(w=>{
    w.exercises.forEach(ex=>{
      ex.sets.forEach(s=>{
        if(!prs[ex.name]||s.weight>prs[ex.name]) prs[ex.name]=s.weight;
      });
    });
  });
  return prs;
}

function renderHistory() {
  const {filter,search,expanded}=histState;
  const prs=getPRs();
  let list=[...workouts]
    .filter(w=>filter==="all"||w.day===filter)
    .filter(w=>!search||w.exercises.some(ex=>ex.name.toLowerCase().includes(search.toLowerCase())))
    .sort((a,b)=>new Date(b.date)-new Date(a.date));

  const cards = list.map(w=>{
    const totalVol = w.exercises.reduce((a,ex)=>a+calcVol(ex.sets.map(s=>({w:s.weight,r:s.reps}))),0);
    const isOpen = expanded===w.id;
    let body="";
    if(isOpen){
      body=`<div class="workout-body">
        ${w.note?`<div style="font-size:12px;color:var(--muted);font-style:italic;margin-bottom:10px">Nota: ${w.note}</div>`:""}
        ${w.exercises.map(ex=>`
          <div style="margin-bottom:12px">
            <div style="font-weight:700;font-size:13px;margin-bottom:6px">${ex.name}</div>
            <div>${ex.sets.map(s=>{
              const isBest=s.weight>0&&s.weight===prs[ex.name];
              return `<span class="set-chip${isBest?" pr":""}">${s.weight}kg×${s.reps}${isBest?" PR":""}</span>`;
            }).join("")}</div>
          </div>`).join("")}
        <button class="btn-danger" onclick="deleteWorkout(${w.id})">Eliminar entreno</button>
      </div>`;
    }
    return `
    <div class="workout-card">
      <div class="workout-header" onclick="toggleExpanded(${w.id})">
        <div>
          <div style="font-weight:700;font-size:14px">${fmtDate(w.date)} — ${w.day}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">Sem ${w.week} · ${w.phase} · ${w.exercises.length} ejercicios</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-weight:800;font-size:14px;color:var(--purple)">${totalVol.toFixed(0)} kg</span>
          <span style="color:var(--faint);font-size:12px">${isOpen?"▲":"▼"}</span>
        </div>
      </div>
      ${body}
    </div>`;
  }).join("");

  return `
  <div>
    <div class="filter-row">
      ${["all","Día A","Día B","Día C"].map(f=>
        `<button class="filter-btn${f===filter?" active":""}" onclick="histState.filter='${f}';render()">${f==="all"?"Todos":f}</button>`
      ).join("")}
    </div>
    <div style="margin-bottom:12px">
      <input type="text" class="search-input" placeholder="Buscar ejercicio..." value="${search}"
        oninput="histState.search=this.value;render()" style="width:100%;border-radius:var(--radius-sm)">
    </div>
    ${list.length===0?`<div class="empty">No hay entrenos registrados todavía.<br>Usá la pestaña Registrar para empezar.</div>`:cards}
  </div>`;
}

function toggleExpanded(id) { histState.expanded = histState.expanded===id?null:id; render(); }
function deleteWorkout(id) {
  if(!confirm("¿Eliminar este entreno?")) return;
  workouts=workouts.filter(w=>w.id!==id);
  histState.expanded=null; save(); render();
}

// ─── STATS TAB ───────────────────────────────────────────────────────────────
function renderStats() {
  const allEx=[...new Set(workouts.flatMap(w=>w.exercises.map(e=>e.name)))].sort();
  const exHistory = allEx.map(name=>{
    const sess=[...workouts].sort((a,b)=>new Date(a.date)-new Date(b.date)).flatMap(w=>{
      const ex=w.exercises.find(e=>e.name===name);
      if(!ex) return [];
      const maxW=Math.max(...ex.sets.map(s=>s.weight||0));
      const vol=ex.sets.reduce((a,s)=>a+(s.weight||0)*(s.reps||0),0);
      return [{date:w.date,week:w.week,maxW,vol}];
    });
    const best=Math.max(0,...sess.map(s=>s.maxW));
    return {name,sessions:sess.length,best,history:sess};
  }).sort((a,b)=>b.best-a.best);

  const totalSessions=workouts.length;
  const totalVol=workouts.reduce((acc,w)=>acc+w.exercises.reduce((a,ex)=>
    a+ex.sets.reduce((b,s)=>b+(s.weight||0)*(s.reps||0),0),0),0);

  if(!statsState.selectedEx && exHistory.length) statsState.selectedEx=exHistory[0].name;
  const selEx=exHistory.find(e=>e.name===statsState.selectedEx)||exHistory[0];

  let chartHtml="";
  if(selEx&&selEx.history.length>0){
    const hist=selEx.history.slice(-14);
    const maxH=Math.max(...hist.map(h=>h.maxW),1);
    const BAR=72;
    chartHtml=`
    <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;margin-bottom:12px">
        <div>
          <div style="font-size:10px;color:var(--faint);font-weight:700;text-transform:uppercase;letter-spacing:.04em">Mejor peso</div>
          <div style="font-size:26px;font-weight:800;color:var(--purple)">${selEx.best} kg</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:10px;color:var(--faint);font-weight:700;text-transform:uppercase;letter-spacing:.04em">Sesiones</div>
          <div style="font-size:26px;font-weight:800;color:var(--text)">${selEx.sessions}</div>
        </div>
      </div>
      <div class="chart-wrap">
        ${hist.map(h=>{
          const bh=Math.max(3,(h.maxW/maxH)*BAR);
          const isBest=h.maxW===selEx.best;
          return `<div class="bar-col">
            <div class="bar-val" style="${isBest?"color:var(--amber)":""}">${h.maxW}</div>
            <div class="bar${isBest?" best":""}" style="height:${bh}px"></div>
            <div class="bar-lbl">S${h.week}</div>
          </div>`;
        }).join("")}
      </div>
      <div style="font-size:10px;color:var(--faint);text-align:center;margin-top:6px">Peso máximo por sesión (kg)</div>
    </div>`;
  }

  if(allEx.length===0) return `<div class="empty">Registrá entrenos para ver estadísticas.</div>`;

  return `
  <div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-val">${totalSessions}</div><div class="stat-label">Entrenos</div></div>
      <div class="stat-card"><div class="stat-val">${(totalVol/1000).toFixed(1)}t</div><div class="stat-label">Volumen</div></div>
      <div class="stat-card"><div class="stat-val">${allEx.length}</div><div class="stat-label">Ejercicios</div></div>
    </div>

    <div style="margin-bottom:12px">
      <label class="label">Progresión de ejercicio</label>
      <select onchange="statsState.selectedEx=this.value;render()">
        ${exHistory.map(e=>`<option value="${e.name}" ${e.name===statsState.selectedEx?"selected":""}>${e.name} — PR: ${e.best}kg</option>`).join("")}
      </select>
    </div>

    ${chartHtml}

    <div>
      <label class="label" style="margin-bottom:8px">Records personales</label>
      ${exHistory.filter(e=>e.best>0).map(e=>`
      <div class="pr-row">
        <div>
          <div style="font-weight:600;font-size:13px">${e.name}</div>
          <div style="font-size:11px;color:var(--faint)">${e.sessions} sesión${e.sessions!==1?"es":""}</div>
        </div>
        <div style="font-weight:800;font-size:16px;color:var(--purple)">${e.best} kg</div>
      </div>`).join("")}
    </div>
  </div>`;
}

// ─── RENDER & NAV ────────────────────────────────────────────────────────────
function render() {
  const content=document.getElementById("content");
  if(currentTab==="log") content.innerHTML=renderLog();
  else if(currentTab==="history") content.innerHTML=renderHistory();
  else content.innerHTML=renderStats();
}

function showTab(tab) {
  currentTab=tab;
  document.querySelectorAll(".tab-btn").forEach((b,i)=>{
    b.classList.toggle("active",["log","history","stats"][i]===tab);
  });
  render();
}

save();
render();
</script>
</body>
</html>
